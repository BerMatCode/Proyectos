<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#000000" />
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: light)" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <title>Fuegos Artificiales - Amor Eterno</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Montserrat:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Montserrat', sans-serif;
      touch-action: none;
    }

    canvas {
      display: block;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 1;
    }

    #credits {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-family: 'Pacifico', cursive;
      font-size: 16px;
      text-shadow: 
        0 0 5px #fff,
        0 0 10px #ff00de,
        0 0 15px #ff0080;
      z-index: 10;
      pointer-events: none;
      opacity: 0.9;
    }

    #start-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #0a0015 0%, #1a0030 50%, #0a0015 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      cursor: pointer;
    }

    #start-overlay::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 50% 50%, rgba(255, 0, 222, 0.1) 0%, transparent 70%);
      animation: pulse-bg 3s ease-in-out infinite;
    }

    @keyframes pulse-bg {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    .start-content {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 20px;
    }

    #start-overlay h1 {
      color: white;
      font-size: 32px;
      margin-bottom: 30px;
      text-shadow: 
        0 0 10px #ff00de, 
        0 0 20px #ff0080,
        0 0 30px #ff00de;
      animation: glow 2s ease-in-out infinite;
    }

    @keyframes glow {
      0%, 100% { 
        text-shadow: 
          0 0 10px #ff00de, 
          0 0 20px #ff0080,
          0 0 30px #ff00de;
      }
      50% { 
        text-shadow: 
          0 0 15px #ff00de, 
          0 0 30px #ff0080,
          0 0 45px #ff00de,
          0 0 60px #ff0080;
      }
    }

    #start-overlay p {
      color: #fff;
      font-size: 20px;
      font-weight: 600;
      animation: pulse 1.5s infinite;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
    }

    @keyframes pulse {
      0%, 100% { 
        opacity: 0.6;
        transform: scale(1);
      }
      50% { 
        opacity: 1;
        transform: scale(1.05);
      }
    }

    .start-credits {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-family: 'Pacifico', cursive;
      font-size: 18px;
      text-shadow: 
        0 0 5px #fff,
        0 0 10px #ff00de,
        0 0 15px #ff0080;
      opacity: 0.9;
    }

    .heart-icon {
      font-size: 60px;
      margin-bottom: 20px;
      animation: heartbeat 1.5s ease-in-out infinite;
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      25% { transform: scale(1.1); }
      50% { transform: scale(1); }
      75% { transform: scale(1.1); }
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="credits">BerMatCode</div>
  
  <div id="start-overlay">
    <div class="start-content">
      <div class="heart-icon">👾</div>
      <h1>Fuegos Artificiales</h1>
      <p>Toca la pantalla para comenzar</p>
    </div>
    <div class="start-credits">BM-MODS</div>
  </div>

  <script>
    // === AUDIO SIEMPRE ACTIVO ===
    let audioEnabled = false;
    let explosionSound = null;
    const startOverlay = document.getElementById('start-overlay');

    function initAudio() {
      if (!explosionSound) {
        explosionSound = new Audio('https://github.com/BerMatCode/Proyectos-personalizados/raw/refs/heads/main/Multimedia/artificial.mp3');
        explosionSound.preload = 'auto';
        explosionSound.volume = 0.7;
      }
    }

    function playExplosion() {
      if (!audioEnabled || !explosionSound) return;
      const sound = explosionSound.cloneNode();
      sound.volume = Math.random() * 0.3 + 0.5;
      sound.playbackRate = Math.random() * 0.3 + 0.85;
      sound.play().catch(() => {});
    }

    startOverlay.addEventListener('click', () => {
      initAudio();
      audioEnabled = true;
      startOverlay.style.display = 'none';
      playExplosion();
    });

    // === CANVAS ===
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // === ESTRELLAS ===
    const stars = [];
    for (let i = 0; i < 120; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 1.5,
        opacity: Math.random() * 0.7 + 0.3
      });
    }

    // === CONFIGURACIÓN ===
    const config = {
      fireworkRate: 7,
      particleCount: 90,
      particleSize: 2,
      particleSpeed: 6,
      trailOpacity: 0.15,
      showLove: true,
      messageDuration: 2800,
      burstDuration: 8000,
      pauseDuration: 1500
    };

    const fireworks = [];
    const particles = [];
    const trails = [];
    
    // === SISTEMA DE PAUSAS ===
    let isBurstActive = true;
    let burstTimer = 0;

    function updateBurstCycle(deltaTime) {
      burstTimer += deltaTime;
      
      if (isBurstActive && burstTimer >= config.burstDuration) {
        isBurstActive = false;
        burstTimer = 0;
      } else if (!isBurstActive && burstTimer >= config.pauseDuration) {
        isBurstActive = true;
        burstTimer = 0;
      }
    }
    
    // === FRASES UNIVERSALES ===
    const loveMessages = [
      "Eres mi cielo hermoso",
      "Mi corazón es tuyo",
      "Te amo con todo",
      "Eres mi todo",
      "❤️ Mi amor eterno ❤️",
      "Siempre juntos",
      "Eres mi vida entera",
      "Te adoro mi amor",
      "Eres mi universo",
      "Nunca te suelto",
      "Mi alma gemela",
      "Eres mi sueño",
      "Te amo profundamente",
      "Eres mi razón de ser",
      "Mi amor verdadero",
      "Contigo soy feliz",
      "Eres mi felicidad",
      "Te amo infinitamente",
      "Mi amor es eterno",
      "Eres mi luz",
      "Te necesito aquí",
      "Eres mi estrella",
      "Mi amor sin fin",
      "Eres perfecto/a",
      "Te amo cada día más",
      "Eres mi cielo azul",
      "Mi corazón late por ti",
      "Eres mi realidad",
      "Te amo vida mía",
      "Eres mi alegría",
      "Mi amor verdadero",
      "Eres especial",
      "Te amo mi amor",
      "Eres mi tesoro",
      "Mi amor crece cada día",
      "Eres mi ángel",
      "Te amo con el alma",
      "Eres mi destino",
      "Mi corazón te pertenece",
      "Eres mi vida",
      "Te amo mi cielo",
      "Eres mi mundo",
      "Mi amor solo es para ti",
      "Eres mi todo",
      "Te amo hoy y siempre",
      "Eres mi complemento",
      "Mi amor infinito",
      "Eres mi sol",
      "Te amo mi amor",
      "Eres todo para mí"
    ];

    // === CLASE FUEGO ARTIFICIAL ===
    class Firework {
      constructor(isBackground = false) {
        this.isBackground = isBackground;
        this.x = Math.random() * canvas.width;
        this.y = canvas.height;
        this.vx = (Math.random() - 0.5) * 3;
        this.vy = -(Math.random() * 8 + 9);
        this.targetY = Math.random() * (canvas.height * 0.35) + canvas.height * 0.2;
        this.color = `hsl(${Math.random() * 360}, 100%, 65%)`;
        this.exploded = false;
        this.trailTimer = 0;
        
        // Si es del fondo, es más pequeño y lento
        if (isBackground) {
          this.vx *= 0.7;
          this.vy *= 0.7;
          this.targetY = Math.random() * (canvas.height * 0.3) + canvas.height * 0.1;
        }
      }

      update() {
        if (this.exploded) return true;

        this.trailTimer++;
        if (this.trailTimer % 2 === 0) {
          trails.push(new Trail(this.x, this.y, this.color));
        }

        this.x += this.vx;
        this.y += this.vy;
        this.vy += 0.04;

        if (this.y <= this.targetY || this.vy >= 0) {
          this.explode();
          return true;
        }
        return false;
      }

      explode() {
        playExplosion();

        // SOLO mostrar palabras en fuegos del PRIMER PLANO (no background)
        if (!this.isBackground && config.showLove && Math.random() > 0.35) {
          const msg = loveMessages[Math.floor(Math.random() * loveMessages.length)];
          const el = document.createElement('div');
          el.textContent = msg;
          
          // Posicionar EXACTAMENTE donde revienta
          el.style.cssText = `
            position: fixed;
            left: ${this.x}px;
            top: ${this.y}px;
            transform: translateX(-50%);
            color: white;
            font-family: 'Montserrat', sans-serif;
            font-weight: bold;
            font-size: 22px;
            text-align: center;
            text-shadow: 
              0 0 10px #fff, 
              0 0 20px #ff5e99,
              0 0 30px #ff0080,
              2px 2px 4px rgba(0,0,0,0.9);
            pointer-events: none;
            opacity: 1;
            z-index: 5;
            transition: all ${config.messageDuration / 1000}s ease-out;
            white-space: nowrap;
          `;
          document.body.appendChild(el);

          setTimeout(() => {
            el.style.top = (this.y - 60) + 'px';
            el.style.opacity = '0';
          }, 10);

          setTimeout(() => el.remove(), config.messageDuration);
        }

        // Menos partículas si es del fondo
        const particleCount = this.isBackground ? config.particleCount * 0.6 : config.particleCount;
        
        for (let i = 0; i < particleCount; i++) {
          particles.push(new Particle(this.x, this.y, this.color, this.isBackground));
        }
      }

      draw() {
        const size = this.isBackground ? 2 : 3;
        ctx.beginPath();
        ctx.arc(this.x, this.y, size, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
        
        if (!this.isBackground) {
          ctx.beginPath();
          ctx.arc(this.x, this.y, 6, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255, 255, 255, 0.3)`;
          ctx.fill();
        }
      }
    }

    // === CLASE RASTRO ===
    class Trail {
      constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.color = color;
        this.alpha = 0.8;
        this.size = 2;
      }

      update() {
        this.alpha -= 0.04;
        this.size *= 0.97;
      }

      draw() {
        if (this.alpha <= 0) return;
        ctx.globalAlpha = this.alpha;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
      }
    }

    // === CLASE PARTÍCULA ===
    class Particle {
      constructor(x, y, color, isBackground = false) {
        this.x = x;
        this.y = y;
        this.color = color;
        this.isBackground = isBackground;
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * config.particleSpeed + 1.5;
        this.vx = Math.cos(angle) * speed * (isBackground ? 0.7 : 1);
        this.vy = Math.sin(angle) * speed * (isBackground ? 0.7 : 1);
        this.alpha = 1;
        this.gravity = 0.08;
        this.friction = 0.95;
      }

      update() {
        this.vy += this.gravity;
        this.vx *= this.friction;
        this.vy *= this.friction;
        this.x += this.vx;
        this.y += this.vy;
        this.alpha -= 0.015;
      }

      draw() {
        ctx.globalAlpha = this.alpha;
        ctx.beginPath();
        const size = this.isBackground ? config.particleSize * 0.7 : config.particleSize;
        ctx.arc(this.x, this.y, size, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
      }
    }

    // === LOOP DE ANIMACIÓN ===
    let lastTime = 0;
    function animate(currentTime) {
      if (!lastTime) lastTime = currentTime;
      const deltaTime = currentTime - lastTime;
      lastTime = currentTime;

      updateBurstCycle(deltaTime);

      ctx.fillStyle = `rgba(0, 0, 0, ${config.trailOpacity})`;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Dibujar estrellas
      if (Math.random() > 0.97) {
        stars.forEach(star => {
          ctx.globalAlpha = star.opacity;
          ctx.beginPath();
          ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
          ctx.fillStyle = '#fff';
          ctx.fill();
        });
        ctx.globalAlpha = 1;
      }

      if (isBurstActive && Math.random() * 100 < config.fireworkRate) {
        // 70% primer plano, 30% fondo
        const isBackground = Math.random() < 0.3;
        fireworks.push(new Firework(isBackground));
      }

      // Actualizar rastros
      for (let i = trails.length - 1; i >= 0; i--) {
        trails[i].update();
        trails[i].draw();
        if (trails[i].alpha <= 0) {
          trails.splice(i, 1);
        }
      }

      // Actualizar fuegos
      ctx.globalAlpha = 1;
      for (let i = fireworks.length - 1; i >= 0; i--) {
        if (fireworks[i].update()) {
          fireworks.splice(i, 1);
        } else {
          fireworks[i].draw();
        }
      }

      // Actualizar partículas
      for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        particles[i].draw();
        if (particles[i].alpha <= 0) {
          particles.splice(i, 1);
        }
      }

      ctx.globalAlpha = 1;
      requestAnimationFrame(animate);
    }

    animate(0);
  </script>
</body>
</html>
